apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sendnotify-ingress
  namespace: obsevability
  labels:
    app: sendnotify
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "sendnotify.dominio.com.br"
      secretName: "sendnotify-tls"
  rules:
    - host: "sendnotify.dominio.com.br"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: svc-sendnotify
                port:
                  name: sendnotify
