apiVersion: apps/v1
kind: Deployment
metadata:
  name: de-sendnotify
  namespace: obsevability
spec:
  selector:
    matchLabels:
      app: sendnotify
  replicas: 1
  template:
    metadata:
      labels:
        app: sendnotify
        version: "1.0.1"
    spec:
      serviceAccountName: sa-sendnotify
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: type
                operator: In
                values:
                - services
      containers:
      - name: sendnotify
        image: gru.ocir.io/grrgazcoqsuy/mutant-app-base:ocisendnotify-1.1.0 
        imagePullPolicy: IfNotPresent
        command:
          - "gunicorn"
          - "-w"
          - "1"
          - "-b"
          - "0.0.0.0:8080"
          - "wsgi:app"
          - "--capture-output"
          - "--log-level=debug"
        ports:
        - name: sendnotify
          containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: "0.2"
            memory: 128Mi
          requests:
            cpu: "0.1"
            memory: 64Mi
        envFrom:
        - secretRef:
            name: s-sendnotify
        - configMapRef:
            name: cm-sendnotify
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 2
