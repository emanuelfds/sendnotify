apiVersion: apps/v1
kind: Deployment
metadata:
  name: de-sendnotify
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: sendnotify
  replicas: 1
  template:
    metadata:
      labels:
        app: sendnotify
        version: "1.0.0"
    spec:
      serviceAccountName: sa-sendnotify
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: apps
                operator: In
                values:
                - monitoring
      containers:
      - name: sendnotify
        image: emanuelfds/sendnotify:1.3.0
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        command:
          - "gunicorn"
          - "-w"
          - "1"
          - "-b"
          - "0.0.0.0:8080"
          - "wsgi:app"
          - "--capture-output"
          - "--log-level=info"
        ports:
        - name: sendnotify
          containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: "0.2"
            memory: 128Mi
          requests:
            cpu: "0.1"
            memory: 64Mi
        envFrom:
        - secretRef:
            name: s-sendnotify
        - configMapRef:
            name: cm-sendnotify
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 2
