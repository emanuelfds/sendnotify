# ATENÇÃO: Arquivo template! NÃO commitar com credenciais reais.
# Use `kubectl create secret generic s-sendnotify --from-literal=AUTH_ADMIN=... --from-literal=AUTH_USER=... --from-literal=WEBHOOK=... -n monitoring`
apiVersion: v1
kind: Secret
metadata:
  name: s-sendnotify
  namespace: monitoring
  labels:
    app: sendnotify
stringData:
  AUTH_ADMIN: "SEU_USUARIO"
  AUTH_USER: "SEU_USUARIO"
  WEBHOOK: "URL_DO_SEU_WEBHOOK"
