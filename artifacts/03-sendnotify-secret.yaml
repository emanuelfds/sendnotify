# ATENCAO: Arquivo template! NAO commitar com credenciais reais.
# Gere o base64 com: echo -n "valor" | base64
apiVersion: v1
kind: Secret
metadata:
  name: s-sendnotify
  namespace: observability
  labels:
    app: sendnotify
type: Opaque
data:
  AUTH_USER: "SEU_USUARIO"      # echo -n "SEU_USUARIO" | base64
  AUTH_PASS: "SEU_PASS"         # echo -n "SEU_PASS" | base64
  WEBHOOK: URL_EM_BASE64        # echo -n "URL_DO_WEBHOOK" | base64
