name: Release Please

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: 🔖 Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Retry release-please (transient error recovery)
        if: steps.release.outcome == 'failure'
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
