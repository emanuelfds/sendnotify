name: Build Docker Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  security-events: write
  id-token: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  security:
    name: 🔍 Trivy Scan (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Repo
            scan-type: fs
            scan-ref: '.'
            category: TrivyScanRepo
            severity: HIGH,CRITICAL
          - label: App
            scan-type: config
            scan-ref: './build'
            category: TrivyScanApp
            severity: CRITICAL,HIGH,MEDIUM
          - label: K8s
            scan-type: config
            scan-ref: './artifacts'
            category: TrivyScanK8s
            severity: CRITICAL,HIGH,MEDIUM
    steps:
      - name: 🚪 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: 🔍 Run Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: ${{ matrix.scan-type }}
          scan-ref: ${{ matrix.scan-ref }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: true
          severity: ${{ matrix.severity }}
          hide-progress: true

      - name: 📤 Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: ${{ matrix.category }}

  sast:
    name: 🛡️ SAST (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Bandit
            tool: bandit
          - label: Gitleaks
            tool: gitleaks
          - label: Hadolint
            tool: hadolint
    steps:
      - name: 🚪 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        if: matrix.tool == 'bandit'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: 🐍 Bandit (SAST)
        if: matrix.tool == 'bandit'
        run: |
          pip install bandit
          bandit -r build/ -ll --skip B101 -f sarif -o bandit-results.sarif || \
            echo '{"version":"2.1.0","$schema":"","runs":[{"tool":{"driver":{"name":"bandit"}},"results":[]}]}' > bandit-results.sarif

      - name: 📤 Upload Bandit SARIF
        if: always() && matrix.tool == 'bandit'
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: 'bandit-results.sarif'
          category: BanditScan

      - name: 🔐 Gitleaks
        if: matrix.tool == 'gitleaks'
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_PAT }}

      - name: 🐳 Hadolint
        if: matrix.tool == 'hadolint'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: build/Dockerfile
          failure-threshold: warning

  ci:
    name: 🧪 CI (Lint + Test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🚪 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: 🐍 Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: pip install black ruff mypy flask requests flask-httpauth werkzeug pytest pip-audit bandit

      - name: 🕵️ Ruff
        run: ruff check .

      - name: 🖤 Black
        run: black build/ --check --verbose

      - name: 🔍 Mypy
        run: mypy build/

      - name: 🧪 Tests
        run: pytest -v

      - name: 🔒 pip-audit
        run: pip-audit -r build/requirements.txt

  dast:
    name: 🎯 DAST (OWASP ZAP)
    needs: [ci]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 🚪 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: 🐳 Build image
        run: docker build -t sendnotify:dast ./build

      - name: ▶️ Start SendNotify
        run: |
          docker run -d --name sendnotify \
            -p 5000:8080 \
            -e AUTH_USER=admin \
            -e AUTH_PASS=test123 \
            -e GOOGLE_CHAT_WEBHOOK_URL=https://hooks.chat.googleapis.com/test \
            sendnotify:dast

      - name: ⏳ Wait for health
        run: |
          echo "Aguardando SendNotify iniciar..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
              echo "SendNotify pronto na tentativa $i"
              exit 0
            fi
            sleep 2
          done
          echo "SendNotify não iniciou em 60s"
          docker logs sendnotify
          exit 1

      - name: 🎯 ZAP Baseline Scan
        uses: zaproxy/action-baseline@6c5a007541891231cd9e0ddec25d4f25c59c9874 # v0.15.0
        with:
          target: http://localhost:5000
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-j -m 1 -T 60'
          fail_action: false

      - name: 📤 Upload ZAP report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: zap-report
          path: report_html.html
          if-no-files-found: warn

      - name: 🛑 Stop SendNotify
        if: always()
        run: docker stop sendnotify || true

  build-and-push:
    name: 🛠️ Build & Push
    needs: [security, sast, ci]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      docker_version: ${{ steps.meta.outputs.version }}
    steps:
      - name: 🚪 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: 👤 Login GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GIT_PAT }}

      - name: 👤 Login Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: ⛏️ Metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            emanuelfds/sendnotify
          tags: |
            type=semver,pattern={{version}}

      - name: 🛠️ Build image (local)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./build
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: 🔍 Trivy scan image (report)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: 🔍 Trivy scan image (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}'
          format: 'sarif'
          output: 'trivy-results-image.sarif'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: 📤 Upload image scan SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always()
        with:
          sarif_file: 'trivy-results-image.sarif'
          category: TrivyScanImage

      - name: 📤 Push image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: 📋 Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: 📤 Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: sbom
          path: sbom.spdx.json

      - name: 📝 Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        continue-on-error: true

      - name: ✍️ Sign image (GHCR)
        if: success()
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        continue-on-error: true

      - name: 📢 Slack - Build
        if: success()
        uses: ./.github/actions/notificar-slack
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          version: ${{ steps.meta.outputs.version }}
          image: emanuelfds/sendnotify
          repo: ${{ github.repository }}
          sha: ${{ github.sha }}
          ref: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          title: "Build Realizado com Sucesso!"

  deploy-argocd:
    name: ☸️ Deploy ArgoCD
    needs: [build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    steps:
      - name: 🚪 Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          token: ${{ secrets.GIT_PAT }}

      - name: 🏷️ Atualizar tag da imagem
        run: |
          set -e

          VERSION="${{ needs.build-and-push.outputs.docker_version }}"
          DEPLOYMENT="artifacts/05-sendnotify-deployment.yaml"

          echo "Atualizando para versão: ${VERSION}"
          sed -i "s#emanuelfds/sendnotify:[^\"]*#emanuelfds/sendnotify:${VERSION}#g" "$DEPLOYMENT"
          sed -i "s#version: \"[^\"]*\"#version: \"${VERSION}\"#" "$DEPLOYMENT"

          if git diff --quiet; then
            echo "Nenhuma alteração detectada."
          else
            git config user.email "sendnotify-bot@users.noreply.github.com"
            git config user.name "sendnotify-bot"
            git add "$DEPLOYMENT"
            git commit -m "🔖 Nova versão da Aplicação: ${VERSION}"
            git push origin main
          fi

      - name: 📢 Slack - Deploy
        if: success()
        uses: ./.github/actions/notificar-slack
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          version: ${{ needs.build-and-push.outputs.docker_version }}
          image: emanuelfds/sendnotify
          repo: ${{ github.repository }}
          sha: ${{ github.sha }}
          ref: main
          actor: ${{ github.actor }}
          title: "Deploy Publicado com Sucesso!"
