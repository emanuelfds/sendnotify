name: Build Docker Image

on:
  push:
    tags:
      - 'v*'

permissions: write-all

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  trivy-scanning:
    name: 🔍 Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Save Trivy SARIF as artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-sarif
          path: trivy-results.sarif

  trivy-scanning-configs:
    name: 🔍 Trivy Scanner Configs
    needs: [trivy-scanning]
    runs-on: ubuntu-latest
    steps:
      - name: 🚪 Checkout
        uses: actions/checkout@v7

      - name: 🔍 Run Trivy vulnerability scanner in IaC mode - Application
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: './build'
          hide-progress: false
          format: 'sarif'
          output: 'trivy-results-application.sarif'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: 📤 Upload Trivy scan results to GitHub Security tab - Application
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results-application.sarif'
          category: 'TrivyScanResultsApplication'

      - name: 🔍 Run Trivy vulnerability scanner in IaC mode - Artifacts
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: './artifacts'
          hide-progress: false
          format: 'sarif'
          output: 'trivy-results-artifacts.sarif'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: 📤 Upload Trivy scan results to GitHub Security tab - Artifacts
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results-artifacts.sarif'
          category: 'TrivyScanResultsArtifacts'

  lint-python:
    name: 🧹 Lint & Type Check Python
    runs-on: ubuntu-latest
    steps:
      - name: 🚪 Checkout do repositório
        uses: actions/checkout@v7

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependências de lint e type checking
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy flask requests flask-httpauth werkzeug

      - name: 🧹 Verificar formatação com Black
        run: black build/ --check --verbose

      - name: 🕵️ Verificar estilo com Ruff
        run: ruff check .

      - name: 🔍 Verificar tipos com Mypy
        run: mypy build/

  test-python:
    name: 🧪 Testar Providers
    runs-on: ubuntu-latest
    steps:
      - name: 🚪 Checkout
        uses: actions/checkout@v7

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 🧪 Rodar testes
        run: python build/tests/test_providers.py

  build-and-push-image:
    name: 🛠️ Build and ⬆️ Push Docker Image
    needs: [trivy-scanning-configs, lint-python, test-python]
    runs-on: ubuntu-latest
    outputs:
      docker_version: ${{ steps.meta.outputs.version }}
    steps:
      - name: 🚪 Checkout Repository
        uses: actions/checkout@v7

      - name: 👤 Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GIT_PAT }}

      - name: 👤 Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: ⛏️ Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            emanuelfds/sendnotify
          tags: |
            type=semver,pattern={{version}}

      - name: 👁️ Display Docker Metadata Output Version
        run: echo "VERSION=${{ steps.meta.outputs.version }}"

      - name: 🛠️ Build and 📤 Push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}'
          format: 'sarif'
          output: 'trivy-results-ghcr.sarif'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: 📤 Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results-ghcr.sarif'

      - name: 📢 Notificar Slack - Build
        if: success()
        uses: ./.github/actions/notificar-slack
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          version: ${{ steps.meta.outputs.version }}
          image: emanuelfds/sendnotify
          repo: ${{ github.repository }}
          sha: ${{ github.sha }}
          ref: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          title: "Build Realizado com Sucesso!"

  deploy-argocd:
    name: ☸️ Deploy Application in ArgoCD
    needs: [build-and-push-image]
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Checkout do repositório App-Manifest
        uses: actions/checkout@v7
        with:
          ref: 'main'
          repository: ${{ github.repository }}
          token: ${{ secrets.GIT_PAT }}
          persist-credentials: true

      - name: 🔁 Checkout deste repositório (com a action local)
        uses: actions/checkout@v7
        with:
          path: 'app'  # evita sobrescrever o App-Manifest

      - name: 👁️ Display Docker Metadata Output Version from build-and-push-image
        run: echo "VERSION=${{ needs.build-and-push-image.outputs.docker_version }}"

      - name: 🏷️ Atualizar tag da imagem no deployment
        run: |
          set -e

          echo "🔧 Configurando Git"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git config user.name "${{ vars.GIT_USERNAME }}"

          DEPLOYMENT_FILE="${{ vars.K8S_PATH }}/06-app-deployment.yaml"
          CONFIGMAP_FILE="${{ vars.K8S_PATH }}/05-app-configmap.yaml"
          VERSION="${{ needs.build-and-push-image.outputs.docker_version }}"
          REGISTRY="${{ env.REGISTRY }}"
          IMAGE_NAME="${{ env.IMAGE_NAME }}"

          if [[ -z "$DEPLOYMENT_FILE" || -z "$VERSION" || -z "$REGISTRY" || -z "$IMAGE_NAME" ]]; then
            echo "❌ Erro: Variável obrigatória não definida."
            echo "🔎 DEPLOYMENT_FILE: $DEPLOYMENT_FILE"
            echo "🔎 VERSION: $VERSION"
            echo "🔎 REGISTRY: $REGISTRY"
            echo "🔎 IMAGE_NAME: $IMAGE_NAME"
            exit 1
          fi

          echo "📂 Diretório atual:"
          pwd

          echo "📄 Conteúdo do arquivo de deployment (antes da alteração):"
          cat "$DEPLOYMENT_FILE"

          echo "🛠️ Atualizando tag da imagem..."
          sed -i "s#${REGISTRY}/${IMAGE_NAME}[^ \"\']*#${REGISTRY}/${IMAGE_NAME}:${VERSION}#g" "$DEPLOYMENT_FILE"

          echo "🔄 Atualizando campo 'version'..."
          sed -i "s/\(version: \"\)[^\"]*\(\".*\)/\1${VERSION}\2/" "$DEPLOYMENT_FILE"
          sed -i "s/\(APP_VERSION: \"\)[^\"]*\(\".*\)/\1${VERSION}\2/" "$CONFIGMAP_FILE"

          echo "✅ Arquivo atualizado:"
          cat "$DEPLOYMENT_FILE"

          if git diff --quiet; then
            echo "🆗 Nenhuma alteração detectada, pulando commit."
          else
            git add .
            git commit -m "🔖 Nova versão da Aplicação: ${VERSION}"
            git push origin main --force-with-lease
          fi

      - name: 📢 Notificar Slack - Deploy
        if: success()
        uses: ./app/.github/actions/notificar-slack
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          version: ${{ needs.build-and-push-image.outputs.docker_version }}
          image: ${{ env.IMAGE_NAME }}
          repo: ${{ github.repository }}
          sha: ${{ github.sha }}
          ref: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          title: "Deploy Publicado com Sucesso!"
